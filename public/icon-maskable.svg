<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so safe zone (inner 80%) is what shows on Android round masks -->
  <rect width="512" height="512" fill="#0a0a0f"/>
  <!-- cube scaled ~65% so it sits inside the maskable safe zone -->
  <g transform="translate(256 272) scale(0.62)">
    <g stroke="#0a0a0f" stroke-width="8" stroke-linejoin="round">
      <polygon fill="url(#top)"   points="0,-160 -138,-80 0,0 138,-80"/>
      <polygon fill="url(#left)"  points="-138,-80 -138,80 0,160 0,0"/>
      <polygon fill="url(#right)" points="138,-80 138,80 0,160 0,0"/>
      <g stroke="#0a0a0f" stroke-width="10" fill="none">
        <line x1="-46" y1="-133" x2="92" y2="-53"/>
        <line x1="46" y1="-133" x2="-92" y2="-53"/>
        <line x1="-92" y1="-107" x2="46" y2="-27"/>
        <line x1="92" y1="-107" x2="-46" y2="-27"/>
        <line x1="-138" y1="-26" x2="0" y2="54"/>
        <line x1="-138" y1="27" x2="0" y2="107"/>
        <line x1="-92" y1="-53" x2="-92" y2="133"/>
        <line x1="-46" y1="-27" x2="-46" y2="160"/>
        <line x1="138" y1="-26" x2="0" y2="54"/>
        <line x1="138" y1="27" x2="0" y2="107"/>
        <line x1="92" y1="-53" x2="92" y2="133"/>
        <line x1="46" y1="-27" x2="46" y2="160"/>
      </g>
    </g>
  </g>
</svg>
